name: Release DataCopter

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # Триггер на семантическое версионирование (например, v1.0.0)
  workflow_dispatch:
    # Возможность ручного запуска из интерфейса GitHub

permissions:
  contents: write # Необходимо для создания релизов и загрузки артефактов

jobs:
  build-and-release:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Матрица архитектур. Настройки линкера подхватываются из .cargo/config.toml
          - target: x86_64-unknown-linux-musl
            apt_deps: musl-tools
            binary_name: datacopter-amd64-linux
          - target: aarch64-unknown-linux-musl
            apt_deps: musl-tools gcc-aarch64-linux-gnu
            binary_name: datacopter-arm64-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install OS Dependencies (musl & cross-compilers)
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_deps }}

      - name: Build Release Binary
        run: |
          # Флаги --release и strip=true (из Cargo.toml) гарантируют минимальный размер
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare and Rename Artifact
        run: |
          # Переименовываем бинарник для ясности перед загрузкой в релиз
          mv target/${{ matrix.target }}/release/datacopter ${{ matrix.binary_name }}

      - name: Upload Binary to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.binary_name }}
          generate_release_notes: true
